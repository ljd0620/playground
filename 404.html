<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg-primary: #080b12;
      --bg-card: #0f1319;
      --bg-elevated: #161c26;
      --border: #1e2a3a;
      --text-primary: #e8edf5;
      --text-secondary: #7d8da0;
      --text-muted: #4a5568;
      --accent-blue: #4da3ff;
      --accent-purple: #b07aff;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(77, 163, 255, 0.06), transparent 70%), radial-gradient(ellipse 60% 40% at 70% 60%, rgba(176, 122, 255, 0.04), transparent 60%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 20px
    }

    .code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #4da3ff 50%, #b07aff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .msg {
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 32px
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #1a6ff0, #1f6feb);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .back-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(77, 163, 255, 0.3)
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="code">404</div>
    <p class="msg">页面未找到，可能已被移动或删除</p>
    <a class="back-btn" href="index.html">← 返回 Playground 首页</a>
  </div>
</body>

</html>
